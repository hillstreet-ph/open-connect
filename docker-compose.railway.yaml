# ==============================================================================
# Open Connect - Railway Deployment (Single Service)
# ==============================================================================0
# Professional single-service deployment for Railway
# Uses Supabase Vaults for all secrets and authentication
# Built-in features: Computer, Terminal, Browser from Open WebUI
# ===============================================================================

version: '3.8'

services:
  open-connect:
    image: ghcr.io/org-hide/open-connect:latest
    build:
      context: .
      dockerfile: Dockerfile.railway
    container_name: open-connect
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - open-connect-data:/app/backend/data
      - open-connect-backups://app/backend/backups
      - computer-workspace:/workspace
      - terminal-workspace:/home/user
    environment:
      - ENV=prod
      - DOCKER=true
      - PORT=8080
      - UVICORN_WORKERS=1
      - LOG_LEVEL=info
      - ENABLE_BACKUP_RESTORE_ON_STARTUP=true
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-open-connect-backups}
      - BACKUP_PREFIX=${BACKUP_PREFIX:-backups}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-https://us.cloud.langfuse.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  open-connect-data:
    driver: local
  open-connect-backups:
    driver: local
  computer-workspace:
    driver: local
  terminal-workspace:
    driver: local
