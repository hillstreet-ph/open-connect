[railway]
template = "dockerfile"
builder = "dockerfile"

[build]
# Use the Railway-optimized Dockerfile with pre-installed plugins
dockerfilePath = "Dockerfile.railway"

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 900
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Use the Railway bootstrap script that restores backups before starting the app
startCommand = "bash /app/backend/railway-start.sh"

[settings]
private = false

# Health monitoring configuration
[railway.healthcheck]
enabled = true
path = "/ready"
interval = 30
timeout = 10
retries = 5

# Resource configuration for stability
[railway.resources]
cpu = "1"
memory = "2Gi"

# Cron jobs for scheduled tasks
[railway.cron]
enabled = true
timezone = "UTC"

# Environment variables (will be overridden by GitHub Actions)
[railway.variables]
ENV = "prod"
DOCKER = "true"
PORT = "8080"
UVICORN_WORKERS = "1"
LOG_LEVEL = "info"
ENABLE_BACKUP_RESTORE_ON_STARTUP = "true"
SUPABASE_BUCKET = "open-connect-backups"
BACKUP_PREFIX = "backups"

# Data persistence
[railway.persistentDisk]
enabled = true
mountPath = "/app/backend/data"
sizeGb = 2