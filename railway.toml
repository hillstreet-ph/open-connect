# =============================================================================
# Open Connect - Railway Configuration (Single Service)
# =============================================================================
# Professional deployment with Supabase Vaults integration
# All secrets are managed via Railway Variables (Supabase Vaults)
# =============================================================================

[railway]
template = "docker-compose"
builder = "docker-compose"

[build]
composeFile = "docker-compose.railway.yaml"

[deploy]
healthcheckPath = "/ready"
healthcheckTimeout = 900
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
startCommand = "bash railway-start.sh"

[settings]
private = false

[railway.healthcheck]
enabled = true
path = "/ready"
interval = 120
timeout = 20
retries = 20

[railway.resources]
cpu = "2"
memory = "4Gi"

[railway.cron]
enabled = true
timezone = "UTC"

[railway.variables]
ENV = "prod"
DOCKER = "true"
PORT = "8080"
UVICORN_WORKERS = "1"
LOG_LEVEL = "info"
ENABLE_BACKUP_RESTORE_ON_STARTUP = "true"
SUPABASE_URL = ""
SUPABASE_ANON_KEY = ""
SUPABASE_SERVICE_ROLE_KEY = ""
DATABASE_URL = ""
REDIS_URL = ""
SUPABASE_BUCKET = "open-connect-backups"
BACKUP_PREFIX = "backups"
OPEN_CONNECT_BASE_URL = "https://open-connect-production.up.railway.app"
OPEN_CONNECT_API_KEY = ""

[railway.persistentDisk]
enabled = true
mountPath = "/app/backend/data"
sizeGb = 4

[railway.persistentVolumes]
open-connect-backups = { enabled = true, mountPath = "/app/backend/backups", sizeGb = 4 }