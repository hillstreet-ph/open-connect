name: Open-Connect CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - 'LICENSE'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: 'false'
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - staging
          - production

jobs:
  validate:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.validation.outputs.should_deploy }}
      commit_hash: ${{ steps.info.outputs.commit_hash }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get commit information
        id: info
        run: |
          echo "commit_hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log -1 --pretty=%B | head -n1 | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Validate deployment conditions
        id: validation
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ inputs.force_deploy }}" == "true" ]]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  backup:
    name: Pre-Deployment Backup
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create backup directory
        run: mkdir -p backups/${{ needs.validate.outputs.commit_hash }}

      - name: Backup configuration
        run: |
          cp -r config/ backups/${{ needs.validate.outputs.commit_hash }}/config/ || true
          cp railway.json backups/${{ needs.validate.outputs.commit_hash }}/railway.json || true
          cp .env.example backups/${{ needs.validate.outputs.commit_hash }}/.env.example || true

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-connect-backup-${{ needs.validate.outputs.commit_hash }}
          path: backups/
          retention-days: 7

  deploy:
    name: Deployment
    needs: [validate, backup]
    if: needs.validate.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: openclose8
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          docker build -t orghide/open-connect-backend:${{ needs.validate.outputs.commit_hash }} -t orghide/open-connect-backend:latest .
          docker push orghide/open-connect-backend:${{ needs.validate.outputs.commit_hash }}
          docker push orghide/open-connect-backend:latest

      - name: Deploy to Railway
        run: |
          npm install -g @railway/cli
          railway login --token ${{ secrets.RAILWAY_TOKEN }}
          railway project select open-connect
          railway up --service open-connect-backend --image orghide/open-connect-backend:${{ needs.validate.outputs.commit_hash }}
          railway up --service open-connect-frontend
          railway up --service open-connect-langfuse
          railway up --service open-connect-supabase

      - name: Verify deployment
        run: |
          sleep 60
          curl -s http://open-connect-backend.up.railway.app/health || echo "Backend not ready"
          curl -s http://open-connect-frontend.up.railway.app/ || echo "Frontend not ready"

  post-deploy:
    name: Post-Deployment
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} -H "Content-Type: application/json" -d '{"text":"🚀 Deployment successful: ${{ needs.validate.outputs.commit_hash }}"}' || true
