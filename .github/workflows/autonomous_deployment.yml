name: Autonomous Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: autonomous-deployment
  cancel-in-progress: true

env:
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_TOKEN }} # Account token must use RAILWAY_API_TOKEN
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  OPEN_CONNECT_BASE_URL: ${{ vars.OPEN_CONNECT_BASE_URL }}
  OPEN_CONNECT_API_KEY: ${{ secrets.OPEN_CONNECT_API_KEY }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
  RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

jobs:
  bootstrap-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.191.3

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Make bootstrap script executable
        run: chmod +x scripts/bootstrap_supabase.sh

      - name: Bootstrap Supabase project
        run: ./scripts/bootstrap_supabase.sh

      - name: Sync Railway variables
        run: |
          # Sanitize the project ID (removing carriage returns and whitespace)
          PROJ_ID=$(echo "${RAILWAY_PROJECT_ID}" | tr -d '\r' | xargs)
          
          # The Railway CLI requires explicit environment and service NAMES, not UUIDs
          ENV_NAME="production"
          SVC_NAME="open-connect"

          echo "Syncing variables for Project: $PROJ_ID, Environment: $ENV_NAME, Service: $SVC_NAME"

          # Sync variables with explicit names to prevent CLI mapping issues
          if [[ -n "${OPEN_CONNECT_BASE_URL:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" OPEN_CONNECT_BASE_URL="$OPEN_CONNECT_BASE_URL"
          fi

          if [[ -n "${OPEN_CONNECT_API_KEY:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" OPEN_CONNECT_API_KEY="$OPEN_CONNECT_API_KEY"
          fi

          if [[ -n "${SUPABASE_URL:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" SUPABASE_URL="$SUPABASE_URL"
          fi

          if [[ -n "${SUPABASE_ANON_KEY:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"
          fi

          if [[ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" SUPABASE_SERVICE_ROLE_KEY="$SUPABASE_SERVICE_ROLE_KEY"
          fi

          if [[ -n "${DATABASE_URL:-}" ]]; then
            railway variables set --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" DATABASE_URL="$DATABASE_URL"
          fi

      - name: Redeploy Railway service
        run: |
          # Sanitize the project ID (removing carriage returns and whitespace)
          PROJ_ID=$(echo "${RAILWAY_PROJECT_ID}" | tr -d '\r' | xargs)
          
          # The Railway CLI requires explicit environment and service NAMES, not UUIDs
          ENV_NAME="production"
          SVC_NAME="open-connect"

          echo "Redeploying service for Project: $PROJ_ID, Environment: $ENV_NAME, Service: $SVC_NAME"
          
          # Deploy using explicit clean and sanitized arguments to prevent CLI mapping issues
          railway up --project "$PROJ_ID" --environment "$ENV_NAME" --service "$SVC_NAME" --detach
          railway status --project "$PROJ_ID" || true

      - name: Smoke test health endpoint
        run: |
          APP_URL="${OPEN_CONNECT_BASE_URL:-https://open-connect-production.up.railway.app}"
          for attempt in {1..20}; do
            if curl -fsS "$APP_URL/ready" >/dev/null; then
              echo "Health check passed"
              exit 0
            fi
            sleep 15
          done
          echo "Health check did not become ready in time" >&2
          exit 1
